steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--all-tags'

  # Step 3: Deploy to Cloud Run (resolve service URLs dynamically)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DOCLING_AGENT_URL=$(gcloud run services describe docling-agent \
          --region=${_REGION} \
          --project=$PROJECT_ID \
          --format="value(status.url)" 2>/dev/null || echo "")
        if [ -n "$$DOCLING_AGENT_URL" ]; then
          echo "Docling agent URL: $$DOCLING_AGENT_URL"
        else
          echo "WARNING: docling-agent not found, DOCLING_AGENT_URL will not be set"
        fi

        ENV_VARS="GCP_PROJECT_ID=$PROJECT_ID"
        ENV_VARS="$$ENV_VARS,GCP_LOCATION=${_REGION}"
        ENV_VARS="$$ENV_VARS,GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
        ENV_VARS="$$ENV_VARS,GOOGLE_CLOUD_LOCATION=${_REGION}"
        ENV_VARS="$$ENV_VARS,GOOGLE_GENAI_USE_VERTEXAI=true"
        ENV_VARS="$$ENV_VARS,AGENT_PROMPT_ID=${_AGENT_PROMPT_ID}"
        ENV_VARS="$$ENV_VARS,AGENT_ENGINE_ID=${_AGENT_ENGINE_ID}"
        ENV_VARS="$$ENV_VARS,LOG_LEVEL=${_LOG_LEVEL}"
        if [ -n "$$DOCLING_AGENT_URL" ]; then
          ENV_VARS="$$ENV_VARS,DOCLING_AGENT_URL=$$DOCLING_AGENT_URL"
        fi

        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --platform managed \
          --ingress internal \
          --no-allow-unauthenticated \
          --network ${_VPC_NETWORK} \
          --subnet ${_VPC_SUBNET} \
          --vpc-egress all-traffic \
          --set-env-vars "$$ENV_VARS" \
          --quiet

# Substitution variables
substitutions:
  _REGION: 'europe-west4'
  _SERVICE_NAME: 'master-agent'
  _AGENT_PROMPT_ID: '5914177388295487488'
  _AGENT_ENGINE_ID: '5316939164761980928'
  _VPC_NETWORK: 'default'
  _VPC_SUBNET: 'default'
  _LOG_LEVEL: 'INFO'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Images to push
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
